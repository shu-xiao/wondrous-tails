  const L = [];
  for (let r = 0; r < 4; r++) L.push([0,1,2,3].map(c => r*4+c));

  }

function* combinations(arr, k) {

  const idx = Array.from({length:k},(_,i)=>i);

    yield idx.map(i => arr[i]);

    return { dist, total: 1 };

    for (const c of combo) full.add(c);

    dist[n]++;
    total++;
  }
  for (const k of [0,1,2,3]) dist[k] = dist[k] / total;
  return { dist, total };
}

function potentialLines(stamped) {
  const need = 9 - stamped.size;
  if (need <= 0) return completedLines(stamped).length;

    for (const c of combo) full.add(c);
    const n = completedLines(full).length;
    if (n > best) best = n;
    if (best >= 3) break;
  }
  return Math.min(best, 3);
}

/* 計算使用者目前 (k 貼紙) 在全局排名中的位置 */
function rankInfo(stampCount, dist, goal /* 'ge1'|'ge2'|'ge3' */) {
  const table = RANK_TABLES[String(stampCount)];
  if (!table) return null;
  const tiers = table[goal];
  if (!tiers || tiers.length === 0) return null;

  let prob;
  if (goal === 'ge1')      prob = dist[1] + dist[2] + dist[3];
  else if (goal === 'ge2') prob = dist[2] + dist[3];
  else                     prob = dist[3];

  const userNumer = Math.round(prob * table.denom);
  const tierIdx = tiers.findIndex(t => t.n === userNumer);

  // 嚴格比你差的配置數 (numerator 較小)
  let strictlyWorse = 0;
  for (const t of tiers) if (t.n < userNumer) strictlyWorse += t.c;
  // 嚴格比你好的配置數
  let strictlyBetter = 0;
  for (const t of tiers) if (t.n > userNumer) strictlyBetter += t.c;

  return {
    table: tiers,
    denom: table.denom,
    total: table.total,
    userNumer,
    tierIdx,                                     // -1 if not found (FP edge case)
    tierCount: tierIdx >= 0 ? tiers[tierIdx].c : 0,
    strictlyWorse,
    strictlyBetter,
    pctWorseOrEqual: ((table.total - strictlyBetter) / table.total) * 100,
  };
}

/* 重新貼後的期望落點 — 眾數 / 加權平均 / 中位 三個指標 */
function expectedRankInfo(stampCount, goal) {
  const table = RANK_TABLES[String(stampCount)];
  if (!table) return null;
  const tiers = table[goal];
  if (!tiers || tiers.length === 0) return null;
  const denom = table.denom;
  const total = table.total;

  // 眾數:配置數最多的 tier
  let modeIdx = 0, modeMax = -1;
  for (let i = 0; i < tiers.length; i++) {
    if (tiers[i].c > modeMax) { modeIdx = i; modeMax = tiers[i].c; }
  }

  // 加權平均機率 → 對應最接近的 tier
  let weightedSum = 0;
  for (const t of tiers) weightedSum += (t.n / denom) * t.c;
  const meanProb = weightedSum / total;
  let meanIdx = 0, meanDiff = Infinity;
  for (let i = 0; i < tiers.length; i++) {
    const d = Math.abs(tiers[i].n / denom - meanProb);
    if (d < meanDiff) { meanIdx = i; meanDiff = d; }
  }

  // 中位:累積配置數達一半的 tier (從機率高的端累積)
  let cum = 0;
  const half = total / 2;
  let medianIdx = tiers.length - 1;
  for (let i = 0; i < tiers.length; i++) {
    cum += tiers[i].c;
    if (cum >= half) { medianIdx = i; break; }
  }

  return {
    modeIdx, modePct: tiers[modeIdx].c / total,
    meanIdx, meanProb,
    medianIdx,
  };
}

/* ────────── 目標策略 ────────── */
const STRATEGIES = {
  balanced: { label: '平衡',   desc: '加權期望線數',   metric: 'expected' },
  bronze:   { label: '銅 ≥1', desc: '至少 1 線機率',  metric: 'ge1' },
  silver:   { label: '銀 ≥2', desc: '至少 2 線機率',  metric: 'ge2' },
  gold:     { label: '金 = 3','desc': '正好 3 線機率',  metric: 'eq3' },
};

function metricValue(dist, strategy) {
  if (strategy === 'balanced') return expectedScore(dist);
  if (strategy === 'bronze')   return dist[1] + dist[2] + dist[3];
  if (strategy === 'silver')   return dist[2] + dist[3];
  if (strategy === 'gold')     return dist[3];
  return 0;
}

function fmtMetric(v, strategy) {
  if (strategy === 'balanced') return v.toFixed(3) + ' 線';
  return (v*100).toFixed(2) + '%';
}

function suggestion(stampCount, currentLines, potential, dist, strategy) {
  if (stampCount < 3) return { kind:'na', text:'再點 ' + (3 - stampCount) + ' 個貼紙才能使用重貼' };
  if (stampCount > 7) return { kind:'na', text:'貼紙超過 7,遊戲內已無法重貼' };

  const cur  = metricValue(dist, strategy);
  const base = metricValue(RESHUFFLE_DIST, strategy);
  const delta = base - cur;

  /* 已達策略目標 → 別動 */
  if (strategy === 'bronze' && currentLines >= 1)
    return { kind:'bad', text:'已達銅賞,不建議重貼', detail:'保留現況 ' + fmtMetric(cur, strategy) };
  if (strategy === 'silver' && currentLines >= 2)
    return { kind:'bad', text:'已達銀賞,不建議重貼', detail:'保留現況 ' + fmtMetric(cur, strategy) };
  if (strategy === 'gold' && currentLines >= 3)
    return { kind:'bad', text:'已達金賞!別亂動', detail:'你已 3 線' };

  /* 衝金: 看潛在 */
  if (strategy === 'gold') {
    if (potential >= 3 && cur > base)
      return { kind:'bad', text:'仍有 3 線機會,不建議重貼', detail:'你 ' + fmtMetric(cur, strategy) + ' > 重貼後 ' + fmtMetric(base, strategy) };
    if (potential < 3)
      return { kind:'good', text:'已無 3 線可能,建議重貼搏 0.21%', detail:'重貼後 P(3) = ' + fmtMetric(base, strategy) };
    return { kind:'mid', text:'邊界,看情況', detail:'你 ' + fmtMetric(cur, strategy) + ' / 重貼後 ' + fmtMetric(base, strategy) };
  }

  /* 平衡 */
  if (strategy === 'balanced') {
    if (currentLines >= 1)
      return { kind:'bad', text:'已有連線,不建議重貼', detail:'你 ' + fmtMetric(cur, strategy) + ' / 重貼後 ' + fmtMetric(base, strategy) };
    if (potential >= 3)
      return { kind:'bad', text:'潛在 3 線,絕對不建議重貼', detail:'重貼會大幅變差' };
    if (potential <= 1)
      return { kind:'good', text:'潛在 ≤1 線,建議重貼', detail:'期望 +' + delta.toFixed(3) + ' 線' };
    if (delta > 0.05)
      return { kind:'good', text:'建議重貼 (期望略佳)', detail:'期望 +' + delta.toFixed(3) + ' 線' };
    if (delta < -0.05)
      return { kind:'bad', text:'不建議重貼 (期望略差)', detail:'期望 ' + delta.toFixed(3) + ' 線' };
    return { kind:'mid', text:'邊界,看心情', detail:'期望差 ' + Math.abs(delta).toFixed(3) + ' 線' };
  }

  /* 銅 / 銀: 比 cur vs base 的百分比 */
  const sig = 0.03;
  if (delta > sig)
    return { kind:'good', text:'建議重貼 (機率較佳)', detail:'+' + (delta*100).toFixed(2) + '% (' + STRATEGIES[strategy].desc + ')' };
  if (delta < -sig)
    return { kind:'bad', text:'不建議重貼 (盤面較佳)', detail:(delta*100).toFixed(2) + '% (' + STRATEGIES[strategy].desc + ')' };
  return { kind:'mid', text:'邊界,看情況', detail:'差 ' + (Math.abs(delta)*100).toFixed(2) + '%' };
}

      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));

        await Promise.all(keys.map(k => caches.delete(k)));

  useEffect(() => {

  }, [theme]);

  }, [stamps]);

  const undo = useCallback(() => {
    if (history.length === 0) return;
    const prev = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setFuture(f => [new Set(stamps), ...f]);
    setStamps(prev);
  }, [history, stamps]);

  const redo = useCallback(() => {
    if (future.length === 0) return;
    const next = future[0];
    setFuture(f => f.slice(1));
    setHistory(h => [...h, new Set(stamps)]);
    setStamps(next);
  }, [future, stamps]);

  /* 鍵盤: Ctrl/Cmd + Z = undo, Ctrl/Cmd + Shift + Z 或 Ctrl + Y = redo */
  useEffect(() => {
    function onKey(e) {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
      const mod = e.ctrlKey || e.metaKey;
      if (mod && (e.key === 'z' || e.key === 'Z') && !e.shiftKey) { e.preventDefault(); undo(); }
      else if (mod && ((e.key === 'z' || e.key === 'Z') && e.shiftKey)) { e.preventDefault(); redo(); }
      else if (mod && (e.key === 'y' || e.key === 'Y')) { e.preventDefault(); redo(); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);

function Stat({label, value, hint}) {
  return (
    <div className="panel rounded-xl p-3 text-center">
      <div className="text-xs opacity-60">{label}</div>
      <div className="text-2xl gold font-semibold mt-0.5">{value}</div>
      {hint && <div className="text-[10px] opacity-40">{hint}</div>}
    </div>
  );
}

/* 機率卡: 帶 ±% 偏差 */
function ProbCard({title, subtitle, dist, baseline, active}) {
  return (
    <div className={'panel rounded-2xl p-3 ' + (active?'border-amber-700/40':'')}>
      <div className="text-center mb-2">
        <div className={'font-semibold ' + (active?'gold':'opacity-80')}>{title}</div>
        {subtitle && <div className="text-[10px] opacity-50 -mt-0.5">{subtitle}</div>}
      </div>
      <div className="space-y-1">
        {[0,1,2,3].map(k=>{
          const isGoal = k === 3;
          const v = dist[k];
          const delta = baseline ? (v - baseline[k]) : null;
          const showDelta = delta !== null && Math.abs(delta) > 0.0005;
          return (
            <div key={k}
                 className={'flex items-center justify-between px-2.5 py-1.5 rounded ' + (
                   isGoal ? 'border border-amber-700/40 bg-amber-950/30' : 'bg-white/[0.03]'
                 )}>
              <span className="text-[12px] opacity-75">{k} 條線</span>
              <div className="flex items-baseline gap-1.5">
                <span className={'text-sm font-semibold ' + (active?'':'opacity-80')}>
                  {(v*100).toFixed(1)}%
                </span>
                {showDelta && (
                  <span className={'text-[10px] tabular-nums ' + (delta > 0 ? 'text-green-400' : 'text-red-400')}>
                    {delta > 0 ? '+' : ''}{(delta*100).toFixed(1)}
                  </span>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* 全局排名面板 */
function RankPanel({stampCount, dist, goal, setGoal, show, setShow}) {
  const info = React.useMemo(
    () => rankInfo(stampCount, dist, goal),
    [stampCount, dist, goal]
  );
  const expInfo = React.useMemo(
    () => expectedRankInfo(stampCount, goal),
    [stampCount, goal]
  );
  if (!info) return null;

  const { table, denom, total, userNumer, tierIdx, tierCount, strictlyWorse, strictlyBetter, pctWorseOrEqual } = info;
  const userProb = denom > 0 ? userNumer / denom : 0;

  // 期望落點(若計算失敗則 null)
  const modeIdx = expInfo ? expInfo.modeIdx : -1;
  const meanIdx = expInfo ? expInfo.meanIdx : -1;
  const medianIdx = expInfo ? expInfo.medianIdx : -1;
  const tierOf = (i) => (i >= 0 && i < table.length) ? table[i] : null;
  const modeTier   = tierOf(modeIdx);
  const meanTier   = tierOf(meanIdx);
  const medianTier = tierOf(medianIdx);

  // 比較:你的 tier 比期望好多少 (數字小 = 排名靠前 = 機率高)
  const diffVs = (i) => (tierIdx >= 0 && i >= 0) ? (i - tierIdx) : null;
  const diffMode   = diffVs(modeIdx);
  const diffMean   = diffVs(meanIdx);
  const diffMedian = diffVs(medianIdx);
  const formatDiff = (d) => {
    if (d === null) return '';
    if (d === 0) return '= 你';
    return d > 0 ? `你領先 ${d} 階` : `你落後 ${-d} 階`;
  };

  const isDegenerate = table.length === 1;

  const goalLabel = { ge1: '銅 ≥ 1 線', ge2: '銀 ≥ 2 線', ge3: '金 ≥ 3 線' }[goal];
  const goalShort = { ge1: '≥1', ge2: '≥2', ge3: '≥3' }[goal];

  // 頭部摘要
  const rankSummary = tierIdx >= 0
    ? `Tier ${tierIdx + 1}/${table.length} · 勝過 ${strictlyWorse.toLocaleString()} 配置 (${(strictlyWorse/total*100).toFixed(2)}%)`
    : `位置外`;

  return (
    <div className="panel rounded-2xl mb-4">
      <button
        onClick={()=>setShow(s=>!s)}
        className="flex items-center justify-between w-full text-left p-4"
        aria-expanded={show}
      >
        <span className="flex items-center gap-2 font-semibold gold">
          <span className={'inline-block transition-transform text-xs ' + (show?'':'-rotate-90')}>▼</span>
          全局排名
          <span className="text-xs opacity-60 font-normal">· k={stampCount} · {goalShort}</span>
        </span>
        <span className="text-[11px] opacity-70 tabular-nums">{rankSummary}</span>
      </button>

      {show && (
        <div className="px-4 pb-4">
          {/* 目標 tab */}
          <div className="grid grid-cols-3 gap-1.5 mb-3">
            {['ge1','ge2','ge3'].map(g => {
              const active = goal === g;
              const palette = {
                ge1: active
                  ? 'bg-gradient-to-br from-orange-500 to-amber-800 text-white font-semibold border-transparent'
                  : 'border border-orange-600/40 text-orange-300 bg-zinc-900/50',
                ge2: active
                  ? 'bg-gradient-to-br from-zinc-200 to-zinc-500 text-zinc-900 font-semibold border-transparent'
                  : 'border border-zinc-300/40 text-zinc-200 bg-zinc-900/50',
                ge3: active
                  ? 'bg-gradient-to-br from-yellow-300 to-amber-600 text-amber-950 font-bold border-transparent'
                  : 'border border-yellow-500/40 text-yellow-300 bg-zinc-900/50',
              }[g];
              const label = { ge1: '銅 ≥1', ge2: '銀 ≥2', ge3: '金 ≥3' }[g];
              return (
                <button
                  key={g}
                  onClick={()=>setGoal(g)}
                  className={'rounded-lg py-1.5 text-xs border transition-colors ' + palette}
                >{label}</button>
              );
            })}
          </div>

          {/* 排名摘要卡 — 你 vs 重新貼期望落點 */}
          {isDegenerate ? (
            <div className="rounded-xl bg-amber-950/30 border border-amber-700/40 p-3 mb-3 text-xs opacity-80">
              <div className="text-[10px] opacity-60 mb-1">目標 {goalLabel}</div>
              <div>k={stampCount} 只有 <span className="gold font-semibold">1 種機率等級</span>,全 {total.toLocaleString()} 個配置都是 <span className="gold font-semibold">{(userProb*100).toFixed(2)}%</span> ({userNumer}/{denom}) — 無排名差異。</div>
            </div>
          ) : (
            <div className="grid grid-cols-2 gap-2 mb-3">
              {/* 你的盤面 */}
              <div className="rounded-xl bg-amber-950/30 border border-amber-700/40 p-3">
                <div className="text-[10px] opacity-60 mb-1 flex items-center gap-1">
                  <span className="gold">▶</span> 你的盤面
                </div>
                <div className="flex items-baseline justify-between gap-2">
                  <div className="text-xl font-bold gold tabular-nums">{(userProb*100).toFixed(2)}%</div>
                  <div className="text-[10px] opacity-60 tabular-nums">{userNumer}/{denom}</div>
                </div>
                <div className="text-[11px] opacity-75 mt-0.5">
                  {tierIdx >= 0
                    ? <>Tier <span className="gold font-semibold">{tierIdx + 1}</span>/{table.length} · 本層 {tierCount.toLocaleString()}</>
                    : <>無法定位</>}
                </div>
                {tierIdx >= 0 && (
                  <div className="text-[10px] opacity-60 mt-0.5">
                    勝過 <span className="text-green-400">{(strictlyWorse/total*100).toFixed(1)}%</span>
                    {strictlyBetter > 0 ? (
                      <span> · 落後 <span className="text-red-400">{(strictlyBetter/total*100).toFixed(1)}%</span></span>
                    ) : null}
                  </div>
                )}
              </div>

              {/* 重新貼後期望落點 (3 個指標) */}
              <div className="rounded-xl bg-white/[0.03] border border-white/10 p-3">
                <div className="text-[10px] opacity-60 mb-1">◇ 重新貼期望</div>
                {expInfo && modeTier && meanTier && medianTier ? (
                  <div className="space-y-0.5 text-[11px]">
                    <div className="flex items-baseline justify-between gap-1.5">
                      <span className="text-blue-300">★ 眾數</span>
                      <span className="tabular-nums">
                        T{modeIdx + 1} ({(modeTier.n/denom*100).toFixed(modeTier.n/denom < 0.01 ? 4 : 2)}%)
                      </span>
                    </div>
                    <div className="text-[9px] opacity-50 -mt-1 ml-3">{(expInfo.modePct*100).toFixed(1)}% 機率落到</div>

                    <div className="flex items-baseline justify-between gap-1.5 pt-1">
                      <span className="text-purple-300">✦ 平均</span>
                      <span className="tabular-nums">
                        T{meanIdx + 1} ({(expInfo.meanProb*100).toFixed(expInfo.meanProb < 0.01 ? 4 : 2)}%)
                      </span>
                    </div>

                    <div className="flex items-baseline justify-between gap-1.5 pt-1">
                      <span className="text-cyan-300">◇ 中位</span>
                      <span className="tabular-nums">
                        T{medianIdx + 1} ({(medianTier.n/denom*100).toFixed(medianTier.n/denom < 0.01 ? 4 : 2)}%)
                      </span>
                    </div>
                  </div>
                ) : <div className="text-[11px] opacity-60">無資料</div>}
              </div>
            </div>
          )}

          {/* 比較結論 */}
          {!isDegenerate && tierIdx >= 0 && expInfo && (
            <div className="text-[11px] mb-3 px-1 space-y-1">
              <div className="opacity-60 text-[10px]">你 vs 重新貼後期望落點</div>
              {[
                { sym: '★', name: '眾數',   color: 'text-blue-300',   diff: diffMode },
                { sym: '✦', name: '加權平均', color: 'text-purple-300', diff: diffMean },
                { sym: '◇', name: '中位',   color: 'text-cyan-300',   diff: diffMedian },
              ].map(row => (
                <div key={row.sym} className="flex items-center gap-2">
                  <span className={row.color + ' shrink-0 w-16 tabular-nums'}>{row.sym} {row.name}</span>
                  <span className={
                    row.diff === null ? 'opacity-50' :
                    row.diff > 0     ? 'text-green-400' :
                    row.diff < 0     ? 'text-red-400'   :
                                       'gold'
                  }>{
                    row.diff === null ? '無法比較' :
                    row.diff === 0   ? '同層 (= 你)' :
                    row.diff > 0     ? `你領先 ${row.diff} 階 (你機率較高)` :
                                       `你落後 ${-row.diff} 階 (你機率較低)`
                  }</span>
                </div>
              ))}
            </div>
          )}

          {/* 完整對照表 */}
          <div className="text-[10px] opacity-50 mb-1.5 text-center">
            全 {total.toLocaleString()} 種 k={stampCount} 配置 · 共 {table.length} 個機率等級
          </div>
          <div className="rank-table-wrap overflow-y-auto rounded-lg border border-white/10" style={{maxHeight: '320px'}}>
            <table className="w-full text-xs border-separate" style={{borderSpacing: 0}}>
              <thead>
                <tr className="text-[10px] opacity-80">
                  <th className="rank-th px-2 py-1.5 text-right font-normal">P({goalShort})</th>
                  <th className="rank-th px-2 py-1.5 text-right font-normal">分數</th>
                  <th className="rank-th px-2 py-1.5 text-right font-normal">配置數</th>
                  <th className="rank-th px-2 py-1.5 text-right font-normal">佔總%</th>
                </tr>
              </thead>
              <tbody className="tabular-nums">
                {table.map((t, i) => {
                  const isUser   = i === tierIdx;
                  const isMode   = i === modeIdx;
                  const isMean   = i === meanIdx;
                  const isMedian = i === medianIdx;
                  const hasMark  = isUser || isMode || isMean || isMedian;
                  const pct = (t.n / denom) * 100;
                  const pctConfigs = (t.c / total) * 100;
                  const rowBg = isUser
                    ? 'bg-amber-700/30 font-semibold'
                    : (hasMark ? 'bg-white/[0.05]' : (i % 2 ? 'bg-white/[0.02]' : ''));
                  return (
                    <tr key={i} className={rowBg}>
                      <td className="px-2 py-1">
                        <div className="flex items-center justify-between gap-2">
                          <span className="inline-flex gap-0.5 text-[11px]">
                            {isUser   && <span className="gold"           title="你的盤面">▶</span>}
                            {isMode   && <span className="text-blue-400"   title="眾數 (最常落點)">★</span>}
                            {isMean   && <span className="text-purple-400" title="加權平均">✦</span>}
                            {isMedian && <span className="text-cyan-400"   title="中位">◇</span>}
                          </span>
                          <span>{pct.toFixed(pct < 1 ? 4 : 2)}%</span>
                        </div>
                      </td>
                      <td className="px-2 py-1 text-right opacity-70">{t.n}/{denom}</td>
                      <td className="px-2 py-1 text-right">{t.c.toLocaleString()}</td>
                      <td className="px-2 py-1 text-right opacity-70">{pctConfigs.toFixed(2)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* 圖例 */}
          <div className="text-[10px] opacity-60 mt-3 px-1 leading-relaxed">
            <div className="font-semibold opacity-80 mb-1">符號說明</div>
            <div className="grid grid-cols-2 gap-x-3 gap-y-0.5">
              <div><span className="gold">▶</span> 你的盤面</div>
              <div><span className="text-blue-400">★</span> 眾數 — 最常落點</div>
              <div><span className="text-purple-400">✦</span> 加權平均機率位置</div>
              <div><span className="text-cyan-400">◇</span> 中位 — 第 50 百分位</div>
            </div>
            <div className="mt-1.5 opacity-70">
              Tier 1 = 機率最高 · 數字愈小排名愈前 · 「領先 N 階」= 你比期望位置高 N 個 Tier
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* 累積機率 chip */
function CumChip({label, cur, base, reward, highlight}) {
  const delta = cur - base;
  const showDelta = Math.abs(delta) > 0.0005;
  return (
    <div className={'panel rounded-xl p-2.5 text-center ' + (highlight?'border-amber-700/40':'')}>
      <div className="text-[10px] opacity-50 mb-0.5">{reward && <span className="mr-1 gold">{reward}</span>}{label}</div>
      <div className="text-base font-semibold gold tabular-nums">{(cur*100).toFixed(2)}%</div>
      <div className="text-[10px] opacity-60 tabular-nums">
        基準 {(base*100).toFixed(2)}%
        {showDelta && (
          <span className={'ml-1 ' + (delta > 0 ? 'text-green-400' : 'text-red-400')}>
            {delta > 0 ? '+' : ''}{(delta*100).toFixed(2)}
          </span>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
